name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: "Steno-Dojo-Mac-Apple-Silicon.dmg"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact_name: "Steno-Dojo-Mac-Intel.dmg"
          - platform: ubuntu-22.04
            args: ""
            artifact_name: "Steno-Dojo-Linux.deb"
          - platform: windows-latest
            args: ""
            artifact_name: "Steno-Dojo-Windows-Setup.exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          
      - name: Rename Artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          
          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
             find src-tauri/target -name "*.dmg" -exec cp "{}" "release-assets/${{ matrix.artifact_name }}" \;
          elif [ "${{ matrix.platform }}" == "windows-latest" ]; then
             find src-tauri/target -name "*setup*.exe" -exec cp "{}" "release-assets/${{ matrix.artifact_name }}" \;
          elif [ "${{ matrix.platform }}" == "ubuntu-22.04" ]; then
             find src-tauri/target -name "*.deb" -exec cp "{}" "release-assets/${{ matrix.artifact_name }}" \;
          fi
          
          echo "Found artifacts:"
          ls -la release-assets/
          
      - name: Upload Renamed Assets to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
